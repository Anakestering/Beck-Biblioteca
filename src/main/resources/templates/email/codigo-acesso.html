<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Código de acesso</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background-color:#1a56db;padding:32px 40px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700;letter-spacing:0.5px;">Biblioteca</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px 40px 32px;">
              <p style="margin:0 0 8px;font-size:15px;color:#374151;">Olá, <strong>{{nome}}</strong>!</p>
              <p style="margin:0 0 28px;font-size:15px;color:#374151;line-height:1.6;">{{mensagem}}</p>

              <!-- Código -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="background-color:#f0f4ff;border:2px dashed #1a56db;border-radius:8px;padding:24px;">
                    <p style="margin:0 0 6px;font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;">Seu código</p>
                    <p style="margin:0;font-size:36px;font-weight:700;color:#1a56db;letter-spacing:8px;">{{codigo}}</p>
                  </td>
                </tr>
              </table>

              <!-- Botão copiar (link) -->
              <p style="margin:16px 0 28px;font-size:13px;color:#6b7280;text-align:center;">
                Ou acesse diretamente pelo botão abaixo e use o código para definir sua senha.
              </p>

              <!-- Botão -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{link}}" style="display:inline-block;background-color:#1a56db;color:#ffffff;text-decoration:none;font-size:15px;font-weight:600;padding:14px 40px;border-radius:6px;">
                      Definir senha
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:28px 0 0;font-size:13px;color:#9ca3af;text-align:center;">
                Este código expira em <strong>20 minutos</strong>. Se você não solicitou isso, ignore este email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f9fafb;padding:20px 40px;text-align:center;border-top:1px solid #e5e7eb;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">© Biblioteca — Sistema de Reservas</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
