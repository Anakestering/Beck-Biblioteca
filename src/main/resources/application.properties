spring.application.name=demo

# --- DEFINIÇÃO DO PROFILE ATIVO ---
spring.profiles.active=local

# --- CONFIGURAÇÕES GERAIS ---
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# --- CAMINHO DE ARQUIVOS (BARRAS CORRIGIDAS PARA WINDOWS/JAVA) ---
arquivamento.path=C:/Users/ana_p_kestering/Downloads/Samuel/beckBiblioteca

# --- CONFIGURAÇÃO DO BANCO DE DADOS (PRODUÇÃO / MYSQL) ---
# O sinal de ':' define um valor padrão caso a variável de ambiente não exista na máquina
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/biblioteca}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# --- CONFIGURAÇÃO DE SEGURANÇA (JWT) ---
# Chave padrão temporária caso o profile local falhe em injetar a dele
jwt.secret=${JWT_SECRET:chave_secreta_padrao_para_evitar_erros_de_inicializacao_no_spring_boot}

# --- CONFIGURAÇÃO DE EMAIL (PRODUÇÃO / SMTP) ---
spring.mail.host=smtp.hostinger.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:teste@producao.com}
spring.mail.password=${MAIL_PASSWORD:senha_padrao}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false